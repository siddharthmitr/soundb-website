function getSpecs(g) {
  // 1. Try specsData from Strapi (already parsed object or JSON string)
  if (g.specsData) {
    try {
      var parsed = typeof g.specsData === 'string' ? JSON.parse(g.specsData) : g.specsData;
      // Must have at least specs array to be valid
      if (parsed && parsed.specs && parsed.specs.length) return parsed;
    } catch(e) {
      console.warn('[Soundb] specsData parse error for', g.name, e);
    }
  }
  // 2. Fall back to hardcoded SPECS_DB (legacy per-ID overrides)
  if (SPECS_DB[g.id]) return SPECS_DB[g.id];
  // 3. Last resort: category defaults
  return generateDefaultSpecs(g);
}

 opacity="0.6"/><circle cx="362" cy="188" r="8" fill="#00c2ff" opacity="0.5"/><text x="210" y="294" text-anchor="middle" font-family="monospace" font-size="11" fill="#00c2ff" opacity="0.4" letter-spacing="4">UNIVERSAL AUDIO</text></svg>`;
  }
  return `<svg width="100%" height="100%" viewBox="0 0 420 340" xmlns="http://www.w3.org/2000/svg"><rect width="420" height="340" fill="${g.color1}"/><defs><radialGradient id="rg${g.id}" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="${g.color2}" stop-opacity="0.18"/><stop offset="100%" stop-color="${g.color1}" stop-opacity="0"/></radialGradient></defs><rect width="420" height="340" fill="url(#rg${g.id})"/><circle cx="210" cy="165" r="105" fill="none" stroke="${g.color2}" stroke-width="0.8" opacity="0.25"/><circle cx="210" cy="165" r="72" fill="none" stroke="${g.color2}" stroke-width="0.6" opacity="0.2"/><circle cx="210" cy="165" r="44" fill="none" stroke="${g.color2}" stroke-width="0.7" opacity="0.3"/><circle cx="210" cy="165" r="20" fill="${g.color2}" opacity="0.18"/><circle cx="210" cy="165" r="7" fill="${g.color2}" opacity="0.85"/><text x="210" y="306" text-anchor="middle" font-family="monospace" font-size="12" fill="${g.color2}" opacity="0.45" letter-spacing="4">${g.brand.toUpperCase()}</text></svg>`;
}

function formatPrice(p) { return '₹' + p.toLocaleString('en-IN'); }

function calcScore(scoreBars) {
  // Average of all individual score bar values, rounded to 1 decimal
  if (!scoreBars || !scoreBars.length) return null;
  var sum = scoreBars.reduce(function(acc, b) { return acc + Number(b.v); }, 0);
  return Math.round((sum / scoreBars.length) * 10) / 10;
}

function loadProduct(g) {
  const data = getSpecs(g);

  // Compute score from scoreBars average if available, else fall back to g.score
  var computedScore = (data.scoreBars && data.scoreBars.length)
    ? calcScore(data.scoreBars)
    : g.score;

  document.title = `${g.name} Specs — Soundb`;
  document.getElementById('bc-cat').textContent = g.cat;
  document.getElementById('bc-name').textContent = g.name;
  const frame = document.getElementById('product-visual-frame');
  frame.innerHTML = productSVG(g) + (g.badge ? `<div class="product-visual-badge badge-${g.badge}">${g.badge==='editors'?"Editor's Choice":g.badge==='new'?'New':'Budget Pick'}</div>` : '');
  document.getElementById('info-eyebrow').textContent = `${g.cat} · ${g.brand}`;
  document.getElementById('info-name').textContent = g.name;
  document.getElementById('info-brand').textContent = `By ${g.brand}`;
  document.getElementById('info-price').textContent = formatPrice(g.price);
  document.getElementById('info-score').textContent = computedScore !== null ? computedScore : g.score;
  document.getElementById('info-cat-badge').textContent = g.cat;
  document.getElementById('verdict-text').textContent = data.verdict;
  const reviewBtn = document.getElementById('btn-review');
  if (g.reviewed) { reviewBtn.onclick = () => location.href='soundb-review.html?id='+g.id; }
  else { reviewBtn.textContent = 'Review Coming Soon'; reviewBtn.classList.add('disabled'); reviewBtn.onclick = null; }
  document.getElementById('score-bars').innerHTML = data.scoreBars.map(b => `<div class="score-bar-row"><div class="score-bar-label">${b.l}</div><div class="score-bar-track"><div class="score-bar-fill" data-w="${b.v*10}"></div></div><div class="score-bar-val">${b.v}</div></div>`).join('');
  // Use specssections (structured) for specs page, fall back to flat specs
  var specsSections = g.specssections || data.specs || [];
  document.getElementById('specs-content').innerHTML = specsSections.map(function(sec) {
    var rows = (sec.rows || []).map(function(row) {
      var k, v;
      if (Array.isArray(row)) { k = row[0]; v = row[1]; }
      else { k = row.key || row.l || row.name || ''; v = row.value || row.v || row.val || ''; }
      return '<tr><td>' + (k||'') + '</td><td>' + (v||'') + '</td></tr>';
    }).join('');
    return '<div class="specs-section"><div class="specs-section-title">' + sec.section + '</div><table class="specs-table">' + rows + '</table></div>';
  }).join('');
  document.getElementById('overview-grid').innerHTML = data.overview.map(o => `<div class="overview-card${o.hl?' highlight':''}"><div class="overview-card-label">${o.l}</div><div class="overview-card-value">${o.v}</div></div>`).join('');
  document.getElementById('overview-summary').textContent = data.summary;
  document.getElementById('pros-list').innerHTML = data.pros.map(p=>`<div class="pros-cons-item"><span class="pros-cons-icon pro">✓</span><span>${p}</span></div>`).join('');
  document.getElementById('cons-list').innerHTML = data.cons.map(c=>`<div class="pros-cons-item"><span class="pros-cons-icon con">✕</span><span>${c}</span></div>`).join('');
  const related = GEAR.filter(x => x.id!==g.id && x.cat===g.cat).slice(0,3);
  document.getElementById('related-grid').innerHTML = related.length ? related.map(r=>`<div class="related-card" onclick="loadById(${r.id})"><div class="related-card-cat">${r.cat}</div><div class="related-card-name">${r.name}</div><div class="related-card-brand">${r.brand}</div><div class="related-card-footer"><div class="related-card-price">${formatPrice(r.price)}</div><div class="related-score">${r.score}<span style="font-size:11px;color:var(--muted)">/10</span></div></div></div>`).join('') : '<div style="padding:32px;color:var(--muted);font-family:var(--font-mono);font-size:12px;text-align:center;grid-column:1/-1">No related products.</div>';
  setTimeout(() => { document.querySelectorAll('.score-bar-fill').forEach(el => { el.style.width = el.dataset.w + '%'; }); }, 120);
  window.history.replaceState({}, '', `soundb-specs.html?id=${g.id}`);
  window.scrollTo({top:0, behavior:'smooth'});
}

function loadById(id) {
  const g = GEAR.find(x => String(x.id) === String(id) || x.id === id);
  if (g) { document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab==='specs')); document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('active',p.id==='tab-specs')); loadProduct(g); }
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  });
});

const params = new URLSearchParams(window.location.search);
var gIdRaw = params.get('id');
// Fallback: npx serve strips query strings
if (!gIdRaw) {
  gIdRaw = localStorage.getItem('soundb_spec_id');
}
localStorage.removeItem('soundb_spec_id');
var gIdNum = gIdRaw !== null ? Number(gIdRaw) : NaN;
CMS.getGear(GEAR).then(function(data) {
  GEAR = data;
  var g = null;
  if (gIdRaw !== null) {
    g = GEAR.find(function(x) { return String(x.id) === String(gIdRaw) || (!isNaN(gIdNum) && x.id === gIdNum); });
  }
  if (!g && GEAR.length) {
    // id not found — show message instead of silently loading wrong product
    console.warn('[Specs] Product id', gIdRaw, 'not found in CMS. Available ids:', GEAR.map(function(x){ return x.id; }));
    document.querySelector('.breadcrumb') && (document.querySelector('.breadcrumb').textContent = 'Product not found — check the URL');
    return;
  }
  if (g) loadProduct(g);
});
</script>
