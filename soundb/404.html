<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="soundb-shared.css">
  <script src="soundb-cms.js"></script>
  <script src="soundb-components.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Soundb</title>
  <meta name="description" content="The page you're looking for doesn't exist. Find what you need at Soundb.">
  <meta name="robots" content="noindex">
</head>
<body>

<main>
  <div style="
    min-height: calc(100vh - 62px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
  ">

    <!-- background glow -->
    <div style="
      position: absolute; inset: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 50% at 50% 40%, rgba(255,140,0,0.06) 0%, transparent 70%);
    "></div>

    <!-- animated waveform behind the 404 -->
    <svg
      viewBox="0 0 800 80"
      preserveAspectRatio="none"
      xmlns="http://www.w3.org/2000/svg"
      style="position:absolute;bottom:15%;left:0;right:0;width:100%;height:80px;opacity:0.07;pointer-events:none"
    >
      <polyline
        points="0,40 80,24 160,56 240,12 320,48 400,20 480,52 560,8 640,44 720,18 800,40"
        fill="none" stroke="#FF8C00" stroke-width="2"
      />
    </svg>

    <!-- content -->
    <div style="position:relative;z-index:1;max-width:640px;width:100%">

      <!-- eyebrow -->
      <div style="
        font-family:var(--font-mono);font-size:11px;color:var(--amber);
        text-transform:uppercase;letter-spacing:0.18em;
        display:flex;align-items:center;justify-content:center;gap:12px;
        margin-bottom:24px;
      ">
        <span style="width:24px;height:1px;background:var(--amber);display:inline-block"></span>
        Error 404
        <span style="width:24px;height:1px;background:var(--amber);display:inline-block"></span>
      </div>

      <!-- big number -->
      <div style="
        font-family:var(--font-display);font-size:clamp(100px,22vw,200px);
        font-weight:900;line-height:0.85;letter-spacing:-6px;
        color:var(--text);margin-bottom:24px;
        position:relative;display:inline-block;
      ">
        4<span style="color:var(--amber)">0</span>4
      </div>

      <!-- headline -->
      <h1 style="
        font-family:var(--font-display);font-size:clamp(24px,4vw,40px);
        font-weight:900;text-transform:uppercase;letter-spacing:-0.5px;
        color:var(--text);line-height:1;margin-bottom:16px;
      ">
        Nothing Here
      </h1>

      <!-- subtext -->
      <p style="
        font-size:15px;color:var(--muted);line-height:1.75;
        max-width:420px;margin:0 auto 40px;
      ">
        The page you're looking for has moved, been deleted, or never existed.
        Try one of the links below, or use search to find what you need.
      </p>

      <!-- primary actions -->
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:56px">
        <button
          onclick="location.href='soundb.html'"
          style="
            background:var(--amber);color:#000;
            font-family:var(--font-display);font-size:15px;font-weight:900;
            text-transform:uppercase;letter-spacing:0.04em;
            padding:13px 28px;border:none;cursor:pointer;
            transition:background 0.2s;
          "
          onmouseover="this.style.background='var(--amber2)'"
          onmouseout="this.style.background='var(--amber)'"
        >
          ← Back to Homepage
        </button>
        <button
          id="open-search-404"
          style="
            background:none;border:1px solid var(--border2);color:var(--muted);
            font-family:var(--font-mono);font-size:12px;letter-spacing:0.08em;
            padding:13px 22px;cursor:pointer;transition:all 0.2s;
          "
          onmouseover="this.style.color='var(--text)';this.style.borderColor='var(--text)'"
          onmouseout="this.style.color='var(--muted)';this.style.borderColor='var(--border2)'"
        >
          Search Soundb →
        </button>
      </div>

      <!-- quick nav grid -->
      <div style="
        display:grid;grid-template-columns:repeat(4,1fr);
        gap:1px;background:var(--border);border:1px solid var(--border);
        text-align:left;
      " id="quick-nav">
      </div>

      <!-- attempted URL display -->
      <div style="
        margin-top:32px;font-family:var(--font-mono);font-size:11px;
        color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px;
      ">
        <span style="opacity:0.5">Attempted URL:</span>
        <span id="attempted-url" style="color:var(--border2);word-break:break-all"></span>
      </div>

    </div>
  </div>
</main>

<script>
/* ── Quick nav data
   CMS note: replace this array with a fetch('/api/nav-sections') call.
   Each item needs: label, desc, icon, url
── */
var NAV_SECTIONS = [
  { label:'News',    desc:'Latest stories',         icon:'◎', url:'soundb-news.html'     },
  { label:'Reviews', desc:'Gear & music reviews',   icon:'◈', url:'soundb-reviews.html'  },
  { label:'Gear',    desc:'Specs & comparisons',    icon:'▣', url:'soundb-gear.html'     },
  { label:'Music',   desc:'Charts & new releases',  icon:'♪', url:'soundb-music.html'    },
];

/* ── Render quick nav ── */
document.getElementById('quick-nav').innerHTML = NAV_SECTIONS.map(function(s) {
  return '<div onclick="location.href=\'' + s.url + '\'" style="' +
    'background:var(--bg2);padding:20px 18px;cursor:pointer;' +
    'transition:background 0.2s;' +
    '" onmouseover="this.style.background=\'var(--card)\'" onmouseout="this.style.background=\'var(--bg2)\'">' +
      '<div style="font-size:18px;color:var(--amber);margin-bottom:8px">' + s.icon + '</div>' +
      '<div style="font-family:var(--font-display);font-size:16px;font-weight:800;text-transform:uppercase;color:var(--text);line-height:1;margin-bottom:4px">' + s.label + '</div>' +
      '<div style="font-family:var(--font-mono);font-size:10px;color:var(--muted)">' + s.desc + '</div>' +
    '</div>';
}).join('');

/* ── Show the attempted URL ── */
document.getElementById('attempted-url').textContent = location.pathname + location.search || '/unknown';

/* ── Wire the Search button to open the global search overlay ──
   Waits for soundb-components.js to inject the overlay first (it's defer).
   CMS note: if using server-side routing, this remains the same.
── */
document.getElementById('open-search-404').addEventListener('click', function() {
  var trigger = document.getElementById('search-trigger');
  if (trigger) trigger.click();
});
</script>
</body>
</html>
